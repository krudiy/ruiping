<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>锐评台 · TIER COURT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Archivo+Black&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#f5f2eb;
      --ink-2:#ffffff;
      --paper:#1a1a2e;
      --signal:#ff4d2e;
      --signal-deep:#c8331a;
      --amber:#e6a817;
      --cyan:#2ab5a5;
      --line:rgba(26,26,46,.12);
      --s:#ff5a6e; --a:#ff9f43; --b:#ffd23c; --c:#e8f24a; --d:#9be15d;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:"Noto Sans SC",system-ui,sans-serif;
      color:var(--paper);
      background:var(--ink);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -webkit-touch-callout:none;
    }

    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg .grain{
      position:absolute;inset:-20%;
      background-image:repeating-linear-gradient(115deg, rgba(0,0,0,.03) 0 2px, transparent 2px 9px);
      mix-blend-mode:overlay;opacity:.4;
    }
    .bg .sprocket{
      position:absolute;top:0;bottom:0;width:26px;
      background:radial-gradient(circle at 50% 18px, rgba(26,26,46,.06) 5px, transparent 6px) 0 0/26px 36px repeat-y;
    }
    .bg .sprocket.l{left:0}.bg .sprocket.r{right:0}
    .bg .float{
      position:absolute;font-family:"ZCOOL QingKe HuangYou",cursive;
      color:rgba(255,77,46,.06);white-space:nowrap;user-select:none;
      animation:drift linear infinite;
    }
    @keyframes drift{from{transform:translateX(20vw)} to{transform:translateX(-120vw)}}

    .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px 90px}

    header{
      position:relative;padding:46px 0 26px;
      display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:end;
      border-bottom:3px solid rgba(26,26,46,.2);
    }
    .stamp{
      font-family:"Archivo Black",sans-serif;
      border:4px solid var(--signal);color:var(--signal);
      padding:10px 16px 8px;line-height:.9;transform:rotate(-7deg);
      box-shadow:6px 6px 0 var(--signal-deep);
      background:rgba(255,77,46,.08);
    }
    .stamp b{display:block;font-size:34px;letter-spacing:1px}
    .stamp span{font-family:"Noto Sans SC";font-weight:900;font-size:11px;letter-spacing:3px;color:var(--paper);opacity:.7}
    .masthead h1{
      font-family:"ZCOOL QingKe HuangYou",cursive;
      font-size:clamp(40px,8vw,86px);line-height:.92;letter-spacing:2px;
      text-shadow:2px 2px 0 rgba(0,0,0,.1);
    }
    .masthead h1 em{font-style:normal;color:var(--amber)}
    .masthead p{margin-top:8px;font-weight:500;opacity:.6;max-width:46ch;font-size:14px}
    .masthead .tag{
      display:inline-block;margin-top:12px;font-size:12px;font-weight:700;
      letter-spacing:2px;color:#fff;background:var(--cyan);
      padding:4px 10px;transform:rotate(1.5deg);
    }

    .court{margin-top:14px;display:flex;flex-direction:column;gap:10px}
    .tier{
      display:grid;grid-template-columns:96px 1fr;min-height:96px;
      border:1px solid var(--line);background:var(--ink-2);
      transition:border-color .2s, box-shadow .2s, transform .2s;
    }
    .tier .label{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:"Archivo Black",sans-serif;color:var(--ink);position:relative;
    }
    .tier .label .lv{font-size:40px;line-height:1}
    .tier .label .word{font-family:"Noto Sans SC";font-weight:900;font-size:10px;
      letter-spacing:1px;margin-top:4px;opacity:.75}
    .tier[data-lv="A"] .label{background:var(--a)}
    .tier[data-lv="B"] .label{background:var(--b)}
    .tier[data-lv="C"] .label{background:var(--c)}
    .tier[data-lv="D"] .label{background:var(--d)}
    .tier[data-lv="E"] .label{background:var(--s)}

    .slot{
      display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;
      padding:10px;min-height:96px;
    }
    .tier.drag-over{border-color:var(--signal);box-shadow:0 0 0 2px var(--signal) inset, 0 14px 40px -20px var(--signal)}

    /* 待选池 */
    .pool-wrap{margin-top:30px}
    .pool-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
    .pool-head h2{font-family:"ZCOOL QingKe HuangYou",cursive;font-size:26px;letter-spacing:2px}
    .pool-head .hint{font-size:12px;opacity:.5;font-weight:500}
    .pool{
      display:flex;flex-wrap:wrap;gap:10px;min-height:140px;padding:14px;
      border:2px dashed var(--line);background:rgba(26,26,46,.02);
      position:relative;
    }
    .pool:empty::after{content:"还没添加作品，点击上方按钮上传图片";color:var(--paper);opacity:.3;
      font-family:"ZCOOL QingKe HuangYou",cursive;font-size:18px;align-self:center;margin:auto}
    .pool.drag-over{border-color:var(--cyan);background:rgba(42,181,165,.08);box-shadow:0 0 0 2px var(--cyan) inset}

    /* 上传区域 */
    .upload-zone{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .upload-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 18px;border:2px solid var(--signal);color:var(--signal);
      font-family:"Noto Sans SC";font-weight:700;font-size:13px;
      letter-spacing:1px;background:rgba(255,77,46,.06);
      cursor:pointer;transition:all .2s;border-radius:4px;
    }
    .upload-btn:hover{background:var(--signal);color:var(--ink)}
    .upload-btn svg{width:16px;height:16px;fill:currentColor}
    .upload-btn input{display:none}

    /* 卡片 */
    .card{
      width:84px;height:118px;border-radius:6px;cursor:grab;position:relative;
      background-size:cover;background-position:center;
      border:2px solid rgba(0,0,0,.15);
      box-shadow:0 4px 12px -4px rgba(0,0,0,.2);
      transition:transform .18s cubic-bezier(.2,.9,.3,1.4), box-shadow .18s;
      display:flex;align-items:flex-end;
      touch-action:none;
    }
    .card::after{
      content:attr(data-title);position:absolute;left:0;right:0;bottom:0;
      font-size:10px;font-weight:700;line-height:1.15;padding:14px 5px 5px;
      color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.85));
      border-radius:0 0 4px 4px;text-shadow:0 1px 2px #000;
    }
    /* 删除按钮 */
    .card .del-btn{
      position:absolute;top:-6px;right:-6px;width:20px;height:20px;
      background:var(--signal);color:#fff;border:none;border-radius:50%;
      font-size:12px;line-height:20px;text-align:center;cursor:pointer;
      opacity:0;transform:scale(.6);transition:all .15s;z-index:10;
      box-shadow:0 2px 6px rgba(0,0,0,.2);
    }
    .card:hover .del-btn{opacity:1;transform:scale(1)}
    .card:hover{
      transform:translateY(-4px) rotate(-1.5deg) scale(1.04);
      box-shadow:0 8px 20px -8px rgba(0,0,0,.25), 0 0 0 1px rgba(0,0,0,.05);
      z-index:5;
      transition:transform .2s cubic-bezier(.2,.9,.3,1.3), box-shadow .2s;
    }
    .card:active{cursor:grabbing;transform:scale(1.08) rotate(-2deg)}
    .card,.card *{user-select:none;-webkit-user-select:none}

    /* 原位占位：半透明 + 虚线轮廓 */
    .sortable-ghost{
      opacity:.4;
      border:2px dashed rgba(255,77,46,.5);
      filter:saturate(.2) brightness(.8);
      transform:none!important;
      box-shadow:none!important;
    }
    /* chosen：原位卡片安静 */
    .sortable-chosen{
      transform:none!important;
      box-shadow:none!important;
    }
    /* 实际跟随光标的克隆体 */
    .sortable-fallback{
      transform:scale(1.12) rotate(-3deg)!important;
      box-shadow:0 12px 30px -8px rgba(255,77,46,.4),
                 0 4px 12px rgba(0,0,0,.15)!important;
      opacity:.95!important;
      cursor:grabbing!important;
      border-color:var(--signal)!important;
      z-index:10000!important;
    }

    /* 落子动画 */
    @keyframes drop{
      0%{transform:scale(1.2) rotate(4deg)}
      50%{transform:scale(.92) rotate(-1.5deg)}
      75%{transform:scale(1.04) rotate(.5deg)}
      100%{transform:none}
    }
    .card.just-dropped{animation:drop .35s cubic-bezier(.22,.68,.35,1.2)}

    footer{margin-top:46px;font-size:12px;opacity:.45;text-align:center;letter-spacing:1px}
    footer code{background:rgba(26,26,46,.08);padding:2px 6px;border-radius:4px;color:var(--amber);opacity:1}

    @media(max-width:640px){
      header{grid-template-columns:1fr;gap:14px}
      .stamp{transform:rotate(-4deg)}
      .tier{grid-template-columns:64px 1fr}
      .tier .label .lv{font-size:28px}
      .card{width:70px;height:98px}
    }
  </style>
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="grain"></div>
  <div class="sprocket l"></div><div class="sprocket r"></div>
  <div class="float" style="top:14%;font-size:46px;animation-duration:38s">神作？过誉了。</div>
  <div class="float" style="top:42%;font-size:64px;animation-duration:52s;animation-delay:-12s">最正义的一集</div>
  <div class="float" style="top:70%;font-size:38px;animation-duration:44s;animation-delay:-26s">心里有秤，手上留情</div>
</div>

<div class="wrap">

  <header>
    <div class="stamp"><b>TIER</b><span>COURT · 评审席</span></div>
    <div class="masthead">
      <h1>锐评<em>分级台</em></h1>
      <p>上传你自己的图片，拖进你心里的等级。A 是封神，E 是劝退——拖完即生效，没有标准答案，只有你的态度。</p>
      <span class="tag">DRAG TO JUDGE · 上传自定义图片</span>
    </div>
  </header>

  <div class="court" id="court">
    <div class="tier" data-lv="A"><div class="label"><span class="lv">A</span><span class="word">封神</span></div><div class="slot" data-tier="A"></div></div>
    <div class="tier" data-lv="B"><div class="label"><span class="lv">B</span><span class="word">佳作</span></div><div class="slot" data-tier="B"></div></div>
    <div class="tier" data-lv="C"><div class="label"><span class="lv">C</span><span class="word">可看</span></div><div class="slot" data-tier="C"></div></div>
    <div class="tier" data-lv="D"><div class="label"><span class="lv">D</span><span class="word">平庸</span></div><div class="slot" data-tier="D"></div></div>
    <div class="tier" data-lv="E"><div class="label"><span class="lv">E</span><span class="word">劝退</span></div><div class="slot" data-tier="E"></div></div>
  </div>

  <div class="pool-wrap">
    <div class="pool-head">
      <h2>待审片单</h2>
      <div class="upload-zone">
        <label class="upload-btn">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
          上传图片
          <input type="file" id="fileInput" accept="image/*" multiple>
        </label>
        <span class="hint">支持多选 · 点击卡片右上角可删除</span>
      </div>
    </div>
    <div class="pool" id="pool"></div>
  </div>

  <footer>
    拖拽排序 · 图片以 Base64 存储在浏览器中 · 存成 .html 即可运行
  </footer>
</div>

<script>
/* ---------- 上传 & 添加逻辑 ---------- */
const fileInput = document.getElementById('fileInput');
const pool = document.getElementById('pool');

fileInput.addEventListener('change', e => {
  const files = [...e.target.files];
  if (!files.length) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      const title = file.name.replace(/\.[^.]+$/, '').slice(0, 20) || '未命名';
      addCard(title, reader.result);
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

/* ---------- 卡片创建 ---------- */
function addCard(title, imgSrc) {
  const c = document.createElement('div');
  c.className = 'card';
  c.dataset.title = title;
  c.style.backgroundImage = `url(${imgSrc})`;
  c.draggable = false; // 禁用浏览器默认拖拽

  // 删除按钮
  const del = document.createElement('span');
  del.className = 'del-btn';
  del.textContent = '✕';
  del.addEventListener('click', e => {
    e.stopPropagation();
    c.style.transform = 'scale(0)';
    c.style.opacity = '0';
    setTimeout(() => c.remove(), 200);
  });
  c.appendChild(del);

  pool.appendChild(c);
}

/* ---------- 拖拽实现 ---------- */
let dragCard = null;
let dragGhost = null;
let offsetX = 0;
let offsetY = 0;

// 鼠标按下开始拖拽
document.addEventListener('mousedown', e => {
  const card = e.target.closest('.card');
  if (!card || e.target.classList.contains('del-btn')) return;

  e.preventDefault(); // 阻止浏览器默认拖拽行为
  dragCard = card;
  const rect = card.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  // 创建拖拽幽灵
  dragGhost = card.cloneNode(true);
  dragGhost.style.position = 'fixed';
  dragGhost.style.pointerEvents = 'none';
  dragGhost.style.zIndex = '10000';
  dragGhost.style.width = rect.width + 'px';
  dragGhost.style.height = rect.height + 'px';
  dragGhost.style.left = (e.clientX - offsetX) + 'px';
  dragGhost.style.top = (e.clientY - offsetY) + 'px';
  dragGhost.style.transform = 'scale(1.12) rotate(-3deg)';
  dragGhost.style.boxShadow = '0 12px 30px -8px rgba(255,77,46,.4), 0 4px 12px rgba(0,0,0,.15)';
  dragGhost.style.opacity = '0.95';
  dragGhost.style.border = '2px solid var(--signal)';
  document.body.appendChild(dragGhost);

  // 原卡片变半透明
  card.style.opacity = '0.4';
  card.style.border = '2px dashed rgba(255,77,46,.5)';
});

// 鼠标移动
document.addEventListener('mousemove', e => {
  if (!dragCard || !dragGhost) return;

  dragGhost.style.left = (e.clientX - offsetX) + 'px';
  dragGhost.style.top = (e.clientY - offsetY) + 'px';

  // 高亮目标tier
  const tiers = document.querySelectorAll('.tier');
  tiers.forEach(tier => {
    const rect = tier.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom) {
      tier.classList.add('drag-over');
    } else {
      tier.classList.remove('drag-over');
    }
  });

  // 高亮pool区域
  const poolRect = pool.getBoundingClientRect();
  if (e.clientX >= poolRect.left && e.clientX <= poolRect.right &&
      e.clientY >= poolRect.top && e.clientY <= poolRect.bottom) {
    pool.classList.add('drag-over');
  } else {
    pool.classList.remove('drag-over');
  }
});

// 鼠标释放
document.addEventListener('mouseup', e => {
  if (!dragCard) return;

  // 找到目标tier
  const tiers = document.querySelectorAll('.tier');
  let targetTier = null;
  tiers.forEach(tier => {
    const rect = tier.getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom) {
      targetTier = tier;
    }
    tier.classList.remove('drag-over');
  });

  // 检查是否拖到了pool区域
  const poolRect = pool.getBoundingClientRect();
  const isOverPool = e.clientX >= poolRect.left && e.clientX <= poolRect.right &&
                     e.clientY >= poolRect.top && e.clientY <= poolRect.bottom;

  // 如果拖到了tier上，移动卡片到tier
  if (targetTier) {
    const slot = targetTier.querySelector('.slot');
    slot.appendChild(dragCard);
    dragCard.classList.add('just-dropped');
    setTimeout(() => dragCard.classList.remove('just-dropped'), 350);
  } else if (isOverPool || !dragCard.closest('.slot')) {
    // 如果拖到了pool区域，或者卡片本来就在pool中但没拖到tier上，放回pool
    pool.appendChild(dragCard);
  }
  // 如果卡片原本在tier中，但没拖到任何tier或pool上，保持原位（不做任何操作）

  // 移除pool高亮
  pool.classList.remove('drag-over');

  // 恢复卡片样式
  dragCard.style.opacity = '';
  dragCard.style.border = '';

  // 移除幽灵
  if (dragGhost) {
    dragGhost.remove();
    dragGhost = null;
  }

  dragCard = null;
});

// 触摸支持
document.addEventListener('touchstart', e => {
  const card = e.target.closest('.card');
  if (!card || e.target.classList.contains('del-btn')) return;

  e.preventDefault(); // 阻止浏览器默认行为
  dragCard = card;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  offsetX = touch.clientX - rect.left;
  offsetY = touch.clientY - rect.top;

  dragGhost = card.cloneNode(true);
  dragGhost.style.position = 'fixed';
  dragGhost.style.pointerEvents = 'none';
  dragGhost.style.zIndex = '10000';
  dragGhost.style.width = rect.width + 'px';
  dragGhost.style.height = rect.height + 'px';
  dragGhost.style.left = (touch.clientX - offsetX) + 'px';
  dragGhost.style.top = (touch.clientY - offsetY) + 'px';
  dragGhost.style.transform = 'scale(1.12) rotate(-3deg)';
  dragGhost.style.boxShadow = '0 12px 30px -8px rgba(255,77,46,.4), 0 4px 12px rgba(0,0,0,.15)';
  dragGhost.style.opacity = '0.95';
  dragGhost.style.border = '2px solid var(--signal)';
  document.body.appendChild(dragGhost);

  card.style.opacity = '0.4';
  card.style.border = '2px dashed rgba(255,77,46,.5)';
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (!dragCard || !dragGhost) return;
  e.preventDefault();

  const touch = e.touches[0];
  dragGhost.style.left = (touch.clientX - offsetX) + 'px';
  dragGhost.style.top = (touch.clientY - offsetY) + 'px';

  const tiers = document.querySelectorAll('.tier');
  tiers.forEach(tier => {
    const rect = tier.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
        touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      tier.classList.add('drag-over');
    } else {
      tier.classList.remove('drag-over');
    }
  });

  // 高亮pool区域
  const poolRect = pool.getBoundingClientRect();
  if (touch.clientX >= poolRect.left && touch.clientX <= poolRect.right &&
      touch.clientY >= poolRect.top && touch.clientY <= poolRect.bottom) {
    pool.classList.add('drag-over');
  } else {
    pool.classList.remove('drag-over');
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!dragCard) return;

  const touch = e.changedTouches[0];
  const tiers = document.querySelectorAll('.tier');
  let targetTier = null;
  tiers.forEach(tier => {
    const rect = tier.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
        touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      targetTier = tier;
    }
    tier.classList.remove('drag-over');
  });

  // 检查是否拖到了pool区域
  const poolRect = pool.getBoundingClientRect();
  const isOverPool = touch.clientX >= poolRect.left && touch.clientX <= poolRect.right &&
                     touch.clientY >= poolRect.top && touch.clientY <= poolRect.bottom;

  if (targetTier) {
    const slot = targetTier.querySelector('.slot');
    slot.appendChild(dragCard);
    dragCard.classList.add('just-dropped');
    setTimeout(() => dragCard.classList.remove('just-dropped'), 350);
  } else if (isOverPool || !dragCard.closest('.slot')) {
    pool.appendChild(dragCard);
  }

  // 移除pool高亮
  pool.classList.remove('drag-over');

  dragCard.style.opacity = '';
  dragCard.style.border = '';

  if (dragGhost) {
    dragGhost.remove();
    dragGhost = null;
  }

  dragCard = null;
});
</script>
</body>
</html>
